<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Timer</title>
    <link rel="stylesheet" href="style_timer.css" />
  </head>
  <body>

    <!-- Floating Hearts -->
    <div class="floating-hearts">
      <span>❤</span>
      <span>❤</span>
      <span>❤</span>
      <span>❤</span>
      <span>❤</span>
      <span>❤</span>
    </div>

    <!-- Blur Circle -->
    <div class="blur-circle blur1"></div>
    <div class="blur-circle blur2"></div>

    <!-- DIGITAL CLOCK -->
    <div class="slide">
      <div class="digital-clock">
        <span id="hours">00</span> :
        <span id="minutes">00</span> :
        <span id="seconds">00</span>

        <div class="days">
          <span id="days-count">0</span> Days
        </div>
      </div>
    </div>

    <div class="navpage">
      <button id="prev">←</button>
      <button id="next">→</button>
    </div>

    <script src="script_timer.js"></script>
  </body>
</html>
