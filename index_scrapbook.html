<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ScrapBook</title>
    <link rel="stylesheet" href="style_scrapbook.css" />
  </head>
  <body>
    <div class="slide" style="background-image: url('img/slide4.jpg')">
      <!-- BUNGA DEKORASI -->
      <div class="flowers-container">
        <div class="flower flower-1">🌸</div>
        <div class="flower flower-2">🌺</div>
        <div class="flower flower-3">🌻</div>
        <div class="flower flower-4">🌷</div>
        <div class="flower flower-5">🌹</div>
        <div class="flower flower-6">🌸</div>
        <div class="flower flower-7">🌺</div>
        <div class="flower flower-8">🌻</div>
      </div>

      <div id="book">
          <input type="checkbox" id="five" />
          <div id="page5" class="page">
            <div class="front"><img src="foto8.png" alt="" /></div>
            <div class="back">LOVE U BABE</div>
            <label for="five"></label>
          </div>

        <input type="checkbox" id="four" />
        <div id="page4" class="page">
          <div class="front"><img src="foto6.png" alt="" /></div>
          <div class="back"><img src="foto7.png" alt="" /></div>
          <label for="four"></label>
        </div>

        <input type="checkbox" id="three" />
        <div id="page3" class="page">
          <div class="front"><img src="foto4.png" alt="" /></div>
          <div class="back"><img src="foto5.png" alt="" /></div>
          <label for="three"></label>
        </div>

        <input type="checkbox" id="two" />
        <div id="page2" class="page">
          <div class="front"><img src="foto2.png" alt="" /></div>
          <div class="back"><img src="foto3.png" alt="" /></div>
          <label for="two"></label>
        </div>

        <input type="checkbox" id="one" />
        <div id="page1" class="page">
          <div class="front">MY💗LOVE</div>
          <div class="back"><img src="foto1.png" alt="" /></div>
          <label for="one"></label>
        </div>
      </div>
    </div>

    

    <script src="script.js"></script>
  </body>
</html>
